<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive Election Process Education Assistant." />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <title>CivicGuide - Election Assistant</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header role="banner" class="app-header">
      <div class="header-container">
        <h1>🏛️ CivicGuide</h1>
        <p>Your Non-Partisan Election Education Assistant</p>
      </div>
    </header>

    <main role="main" class="app-main">
      <section class="chat-container" aria-label="Chat Interface">
        <!-- Live region for screen readers to announce new messages -->
        <div id="chat-history" class="chat-history" role="log" aria-live="polite" aria-atomic="false">
          <div class="message assistant-message">
            <div class="message-content">
              <p>Hello! I am CivicGuide, your interactive Election Education Assistant. I'm here to help you understand how elections work, step-by-step. What would you like to learn about today?</p>
            </div>
          </div>
        </div>

        <div id="loading-indicator" class="loading-indicator hidden" aria-hidden="true">
          <div class="spinner"></div>
          <span>CivicGuide is typing...</span>
        </div>

        <form id="chat-form" class="chat-form" aria-label="Message Form">
          <label for="user-input" class="sr-only">Type your message</label>
          <input 
            type="text" 
            id="user-input" 
            name="user-input"
            class="user-input" 
            placeholder="Ask about the election process..." 
            required 
            autocomplete="off"
            aria-required="true"
          />
          <button type="submit" id="send-button" class="send-button" aria-label="Send Message">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
